<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT Audio Player with Waveform</title>
    <script src="wavesurfer.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; color: #00d4ff; }
        .container { max-width: 900px; margin: 0 auto; }
        .upload-section { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .upload-box { flex: 1; min-width: 300px; background: #16213e; padding: 20px; border-radius: 12px; border: 2px dashed #444; }
        .upload-box:hover { border-color: #00d4ff; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #00d4ff; }
        input[type="file"] { width: 100%; padding: 10px; background: #0f0f23; border-radius: 8px; color: #fff; }
        .player-section { background: #16213e; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        #waveform { width: 100%; height: 80px; background: #0f0f23; border-radius: 8px; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-primary:hover { background: #00b8e6; }
        .btn-secondary { background: #444; color: #fff; }
        .btn-secondary:hover { background: #555; }
        .speed-control { display: flex; align-items: center; gap: 8px; }
        .speed-control select { padding: 8px; border-radius: 6px; background: #0f0f23; color: #fff; border: 1px solid #444; }
        .subtitle-display { background: #0f0f23; padding: 20px; border-radius: 12px; min-height: 150px; }
        .subtitle-display h3 { margin-bottom: 15px; color: #00d4ff; }
        #subtitle-text { font-size: 18px; line-height: 1.6; min-height: 100px; }
        .current-subtitle { color: #00d4ff; font-weight: 600; }
        .subtitle-list { max-height: 400px; overflow-y: auto; }
        .subtitle-item { padding: 8px; margin: 4px 0; border-radius: 6px; cursor: pointer; }
        .subtitle-item:hover { background: #1e3a5f; }
        .subtitle-item.active { background: #00d4ff; color: #000; }
        .subtitle-time { color: #888; font-size: 12px; }
        .status { text-align: center; padding: 10px; color: #888; }
        .status.ready { color: #00ff88; }
        .status.playing { color: #00d4ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 SRT Audio Player</h1>
        
        <div class="upload-section">
            <div class="upload-box">
                <label>1. Upload Audio File</label>
                <input type="file" id="audio-input" accept="audio/*,.m4a,.mp3,.wav,.flac,.ogg,.webm">
            </div>
            <div class="upload-box">
                <label>2. Upload SRT File</label>
                <input type="file" id="srt-input" accept=".srt">
            </div>
        </div>
        
        <div class="player-section">
            <div id="waveform"></div>
            <div class="controls">
                <button class="btn-primary" id="play-btn">▶ Play</button>
                <button class="btn-secondary" id="stop-btn">⏹ Stop</button>
                <div class="speed-control">
                    <label>Speed:</label>
                    <select id="speed-select">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                </div>
                <span id="time-display">00:00 / 00:00</span>
            </div>
            <div class="status" id="status">Upload both files to start</div>
        </div>
        
        <div class="subtitle-display">
            <h3>📝 Subtitles</h3>
            <div id="subtitle-text">No subtitles loaded</div>
            <hr style="border-color: #333; margin: 15px 0;">
            <h4>All Segments</h4>
            <div class="subtitle-list" id="subtitle-list"></div>
        </div>
    </div>

    <script>
        let wavesurfer;
        let subtitles = [];
        let currentIndex = -1;

        const audioInput = document.getElementById('audio-input');
        const srtInput = document.getElementById('srt-input');
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');
        const speedSelect = document.getElementById('speed-select');
        const timeDisplay = document.getElementById('time-display');
        const statusEl = document.getElementById('status');
        const subtitleText = document.getElementById('subtitle-text');
        const subtitleList = document.getElementById('subtitle-list');

        function initWaveform() {
            wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#00d4ff',
                progressColor: '#0088aa',
                cursorColor: '#fff',
                barWidth: 2,
                barGap: 1,
                barRadius: 3,
                height: 80,
                normalize: true,
            });

            wavesurfer.on('play', () => {
                playBtn.textContent = '⏸ Pause';
                statusEl.textContent = '▶ Playing';
                statusEl.className = 'status playing';
            });

            wavesurfer.on('pause', () => {
                playBtn.textContent = '▶ Play';
                statusEl.textContent = '⏸ Paused';
                statusEl.className = 'status';
            });

            wavesurfer.on('timeupdate', (currentTime) => {
                updateTimeDisplay(currentTime);
                updateCurrentSubtitle(currentTime);
            });

            wavesurfer.on('finish', () => {
                playBtn.textContent = '▶ Play';
                statusEl.textContent = '✓ Finished';
                statusEl.className = 'status ready';
            });
        }

        function parseSRT(srtText) {
            const blocks = srtText.trim().split(/\n\n+/);
            const parsed = [];
            
            for (const block of blocks) {
                const lines = block.split('\n');
                if (lines.length < 3) continue;
                
                const timeLine = lines[1];
                const timeMatch = timeLine.match(/(\d{2}):(\d{2}):(\d{2}),(\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2}),(\d{3})/);
                
                if (timeMatch) {
                    const startTime = parseInt(timeMatch[1]) * 3600 + parseInt(timeMatch[2]) * 60 + parseInt(timeMatch[3]) + parseInt(timeMatch[4]) / 1000;
                    const endTime = parseInt(timeMatch[5]) * 3600 + parseInt(timeMatch[6]) * 60 + parseInt(timeMatch[7]) + parseInt(timeMatch[8]) / 1000;
                    const text = lines.slice(2).join(' ');
                    
                    parsed.push({ start: startTime, end: endTime, text: text });
                }
            }
            
            return parsed;
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateTimeDisplay(currentTime) {
            const duration = wavesurfer.getDuration();
            timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;
        }

        function updateCurrentSubtitle(currentTime) {
            const index = subtitles.findIndex(s => currentTime >= s.start && currentTime <= s.end);
            
            if (index !== -1 && index !== currentIndex) {
                currentIndex = index;
                subtitleText.innerHTML = `<span class="current-subtitle">${subtitles[index].text}</span>`;
                
                document.querySelectorAll('.subtitle-item').forEach((el, i) => {
                    el.classList.toggle('active', i === index);
                });
            } else if (index === -1) {
                currentIndex = -1;
                subtitleText.textContent = '...';
            }
        }

        function renderSubtitleList() {
            subtitleList.innerHTML = subtitles.map((s, i) => `
                <div class="subtitle-item" data-index="${i}" onclick="seekTo(${s.start})">
                    <span class="subtitle-time">${formatTime(s.start)} - ${formatTime(s.end)}</span><br>
                    ${s.text.substring(0, 80)}${s.text.length > 80 ? '...' : ''}
                </div>
            `).join('');
        }

        function seekTo(time) {
            wavesurfer.seekTo(time / wavesurfer.getDuration());
            wavesurfer.play();
        }

        audioInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!wavesurfer) initWaveform();
            
            const url = URL.createObjectURL(file);
            wavesurfer.load(url);
            
            statusEl.textContent = 'Audio loaded';
            statusEl.className = 'status ready';
        });

        srtInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                subtitles = parseSRT(event.target.result);
                renderSubtitleList();
                subtitleText.textContent = 'SRT loaded - ' + subtitles.length + ' segments';
                statusEl.textContent = 'SRT loaded - ' + subtitles.length + ' segments';
                statusEl.className = 'status ready';
            };
            reader.readAsText(file);
        });

        playBtn.addEventListener('click', () => {
            if (!wavesurfer) return;
            wavesurfer.playPause();
        });

        stopBtn.addEventListener('click', () => {
            if (!wavesurfer) return;
            wavesurfer.stop();
            playBtn.textContent = '▶ Play';
            statusEl.textContent = 'Stopped';
        });

        speedSelect.addEventListener('change', (e) => {
            if (!wavesurfer) return;
            wavesurfer.setPlaybackRate(parseFloat(e.target.value));
        });
    </script>
</body>
</html>
