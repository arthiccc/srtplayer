<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT Player</title>
    <meta name="theme-color" content="#1a1a2e">
    <script src="wavesurfer.min.js"></script>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :focus-visible { outline: 2px solid #00d4ff; outline-offset: 2px; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        h1 { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; color: #00d4ff; }
        .logo { width: 32px; height: 32px; }
        .container { max-width: 900px; margin: 0 auto; }
        .upload-section { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .upload-box { flex: 1; min-width: 300px; background: #16213e; padding: 20px; border-radius: 12px; border: 2px dashed #444; }
        .upload-box:hover { border-color: #00d4ff; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #00d4ff; }
        input[type="file"] { width: 100%; padding: 12px; background: #0f0f23; border-radius: 8px; color: #fff; cursor: pointer; }
        .player-section { background: #16213e; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        #waveform { width: 100%; height: 80px; background: #0f0f23; border-radius: 8px; margin-bottom: 15px; }
        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        button { padding: 14px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-primary:hover { background: #00b8e6; }
        .btn-secondary { background: #444; color: #fff; }
        .btn-secondary:hover { background: #555; }
        .speed-control { display: flex; align-items: center; gap: 8px; }
        .speed-control select { padding: 12px 16px; border-radius: 8px; background: #0f0f23; color: #fff; border: 1px solid #444; font-size: 14px; cursor: pointer; }
        .time-display { font-family: monospace; font-size: 14px; color: #888; }
        .subtitle-display { background: #0f0f23; padding: 20px; border-radius: 12px; min-height: 150px; }
        .subtitle-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .subtitle-header h3 { color: #00d4ff; }
        .copy-btn { padding: 8px 16px; font-size: 12px; background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; cursor: pointer; }
        .copy-btn:hover { background: #444; }
        #subtitle-text { font-size: 18px; line-height: 1.6; min-height: 100px; }
        .current-subtitle { color: #00d4ff; font-weight: 600; }
        .subtitle-list { max-height: 400px; overflow-y: auto; scrollbar-width: thin; }
        .subtitle-item { padding: 12px; margin: 4px 0; border-radius: 8px; cursor: pointer; }
        .subtitle-item:hover { background: #1e3a5f; }
        .subtitle-item.active { background: #00d4ff; color: #000; }
        .subtitle-time { color: #888; font-size: 12px; }
        .status { text-align: center; padding: 10px; color: #888; }
        .status.ready { color: #00ff88; }
        .status.playing { color: #00d4ff; }
        .file-info { font-size: 12px; color: #666; margin-top: 8px; }
        .repo-link { text-align: center; margin-top: 20px; font-size: 12px; }
        .repo-link a { color: #666; text-decoration: none; }
        .repo-link a:hover { color: #00d4ff; }
        
        .equalizer-section { background: #16213e; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; }
        .equalizer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .equalizer-header h3 { color: #00d4ff; font-size: 14px; }
        .eq-toggle { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; }
        .eq-toggle input { width: auto; }
        .eq-bands { display: flex; justify-content: space-between; gap: 10px; }
        .eq-band { flex: 1; text-align: center; }
        .eq-band label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; }
        .eq-band input[type="range"] { width: 100%; height: 80px; writing-mode: vertical-lr; direction: rtl; -webkit-appearance: none; background: transparent; cursor: pointer; }
        .eq-band input[type="range"]::-webkit-slider-track { width: 6px; background: #333; border-radius: 3px; }
        .eq-band input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #00d4ff; border-radius: 50%; margin-left: -5px; }
        .eq-band .db-value { font-size: 11px; color: #00d4ff; font-weight: 600; margin-top: 5px; }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <svg class="logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="8" width="28" height="16" rx="2" stroke="#00d4ff" stroke-width="2"/>
                <path d="M8 16L12 12L16 16L20 12L24 16" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="26" cy="24" r="4" fill="#00d4ff"/>
            </svg>
            SRT Player
        </h1>
        
        <div class="upload-section">
            <div class="upload-box">
                <label>Audio File</label>
                <input type="file" id="audio-input" accept="audio/*,.m4a,.mp3,.wav,.flac,.ogg,.webm">
                <div class="file-info" id="audio-info">No file selected</div>
            </div>
            <div class="upload-box">
                <label>SRT File</label>
                <input type="file" id="srt-input" accept=".srt">
                <div class="file-info" id="srt-info">No file selected</div>
            </div>
        </div>
        
        <div class="player-section">
            <div id="waveform"></div>
            <div class="controls">
                <button class="btn-primary" id="play-btn">▶ Play</button>
                <button class="btn-secondary" id="stop-btn">⏹ Stop</button>
                <button class="btn-secondary" id="reset-btn">↺ Reset</button>
                <div class="speed-control">
                    <select id="speed-select">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                </div>
                <span class="time-display" id="time-display">00:00 / 00:00</span>
            </div>
            <div class="status" id="status">Select audio and SRT files</div>
        </div>
        
        <div class="equalizer-section">
            <div class="equalizer-header">
                <h3>🎛️ Equalizer</h3>
                <label class="eq-toggle">
                    <input type="checkbox" id="eq-enabled"> Enable EQ
                </label>
            </div>
            <div class="eq-presets" style="margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap;">
                <button class="btn-secondary" style="padding: 8px 16px; font-size: 12px;" onclick="setEQPreset('flat')">Flat</button>
                <button class="btn-secondary" style="padding: 8px 16px; font-size: 12px;" onclick="setEQPreset('bass')">Bass Boost</button>
                <button class="btn-secondary" style="padding: 8px 16px; font-size: 12px;" onclick="setEQPreset('treble')">Treble Boost</button>
                <button class="btn-secondary" style="padding: 8px 16px; font-size: 12px;" onclick="setEQPreset('vocal')">Vocal</button>
                <button class="btn-secondary" style="padding: 8px 16px; font-size: 12px;" onclick="setEQPreset('radio')">Radio</button>
            </div>
            <div class="eq-bands">
                <div class="eq-band">
                    <label>60Hz<br><small>Bass</small></label>
                    <input type="range" id="eq-60" min="-12" max="12" value="0" step="1">
                    <div class="db-value" id="val-60">0 dB</div>
                </div>
                <div class="eq-band">
                    <label>230Hz<br><small>Low Mid</small></label>
                    <input type="range" id="eq-230" min="-12" max="12" value="0" step="1">
                    <div class="db-value" id="val-230">0 dB</div>
                </div>
                <div class="eq-band">
                    <label>910Hz<br><small>Mid</small></label>
                    <input type="range" id="eq-910" min="-12" max="12" value="0" step="1">
                    <div class="db-value" id="val-910">0 dB</div>
                </div>
                <div class="eq-band">
                    <label>3.6kHz<br><small>High Mid</small></label>
                    <input type="range" id="eq-3600" min="-12" max="12" value="0" step="1">
                    <div class="db-value" id="val-3600">0 dB</div>
                </div>
                <div class="eq-band">
                    <label>14kHz<br><small>Treble</small></label>
                    <input type="range" id="eq-14000" min="-12" max="12" value="0" step="1">
                    <div class="db-value" id="val-14000">0 dB</div>
                </div>
            </div>
        </div>
        
        <div class="subtitle-display">
            <div class="subtitle-header">
                <h3>Subtitles</h3>
                <button class="copy-btn" id="copy-btn" aria-label="Copy all subtitles to clipboard">Copy All</button>
            </div>
            <div id="subtitle-text">No subtitles loaded</div>
            <hr style="border-color: #333; margin: 15px 0;">
            <div class="subtitle-list" id="subtitle-list"></div>
        </div>

        <div class="repo-link">
            <a href="https://github.com/arthiccc/srtplayer" target="_blank" rel="noopener">GitHub →</a>
        </div>
    </div>

    <script>
        let wavesurfer;
        let subtitles = [];
        let currentIndex = -1;
        let lastAudioName = localStorage.getItem('lastAudioName') || '';
        let lastSRTName = localStorage.getItem('lastSRTName') || '';

        const audioInput = document.getElementById('audio-input');
        const srtInput = document.getElementById('srt-input');
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');
        const resetBtn = document.getElementById('reset-btn');
        const copyBtn = document.getElementById('copy-btn');
        const speedSelect = document.getElementById('speed-select');
        const timeDisplay = document.getElementById('time-display');
        const statusEl = document.getElementById('status');
        const subtitleText = document.getElementById('subtitle-text');
        const subtitleList = document.getElementById('subtitle-list');
        const audioInfo = document.getElementById('audio-info');
        const srtInfo = document.getElementById('srt-info');

        if (lastAudioName) audioInfo.textContent = `Last: ${lastAudioName}`;
        if (lastSRTName) srtInfo.textContent = `Last: ${lastSRTName}`;

        // Global EQ state
        let eqEnabled = false;
        let eqContext, eqFilters = [], audioSource;
        
        function initEQ() {
            if (eqContext) return;
            eqContext = new (window.AudioContext || window.webkitAudioContext)();
            const frequencies = [60, 230, 910, 3600, 14000];
            
            for (let i = 0; i < frequencies.length; i++) {
                const filter = eqContext.createBiquadFilter();
                if (i === 0) {
                    filter.type = 'lowshelf';
                    filter.frequency.value = frequencies[i];
                } else if (i === frequencies.length - 1) {
                    filter.type = 'highshelf';
                    filter.frequency.value = frequencies[i];
                } else {
                    filter.type = 'peaking';
                    filter.frequency.value = frequencies[i];
                    filter.Q.value = 1;
                }
                filter.gain.value = 0;
                eqFilters.push(filter);
            }
            // Chain filters
            for (let i = 0; i < eqFilters.length - 1; i++) {
                eqFilters[i].connect(eqFilters[i + 1]);
            }
            eqFilters[eqFilters.length - 1].connect(eqContext.destination);
        }
        
        function updateEQValues() {
            if (!eqFilters.length) return;
            const bands = ['60', '230', '910', '3600', '14000'];
            bands.forEach((band, i) => {
                const val = parseFloat(document.getElementById(`eq-${band}`).value);
                document.getElementById(`val-${band}`).textContent = (val > 0 ? '+' : '') + val + ' dB';
                eqFilters[i].gain.value = document.getElementById('eq-enabled').checked ? val : 0;
            });
        }
        
        // Presets
        function setEQPreset(preset) {
            const presets = {
                flat: [0, 0, 0, 0, 0],
                bass: [8, 4, 0, 0, 0],
                treble: [0, 0, 0, 4, 8],
                vocal: [-2, 2, 6, 2, -2],
                radio: [-2, 0, 6, 4, 0]
            };
            const vals = presets[preset] || presets.flat;
            ['eq-60', 'eq-230', 'eq-910', 'eq-3600', 'eq-14000'].forEach((id, i) => {
                document.getElementById(id).value = vals[i];
            });
            updateEQValues();
        }
        
        function initWaveform() {
            wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#00d4ff',
                progressColor: '#0088aa',
                cursorColor: '#fff',
                barWidth: 2,
                barGap: 1,
                barRadius: 3,
                height: 80,
                normalize: true,
            });

            wavesurfer.on('play', () => {
                playBtn.textContent = '⏸ Pause';
                statusEl.textContent = '▶ Playing';
                statusEl.className = 'status playing';
            });

            wavesurfer.on('pause', () => {
                playBtn.textContent = '▶ Play';
                statusEl.textContent = '⏸ Paused';
                statusEl.className = 'status';
            });

            wavesurfer.on('timeupdate', (currentTime) => {
                updateTimeDisplay(currentTime);
                updateCurrentSubtitle(currentTime);
            });

            wavesurfer.on('finish', () => {
                playBtn.textContent = '▶ Play';
                statusEl.textContent = '✓ Finished';
                statusEl.className = 'status ready';
            });
        }

        function parseSRT(srtText) {
            const blocks = srtText.trim().split(/\n\n+/);
            const parsed = [];
            
            for (const block of blocks) {
                const lines = block.split('\n');
                if (lines.length < 3) continue;
                
                const timeLine = lines[1];
                const timeMatch = timeLine.match(/(\d{2}):(\d{2}):(\d{2}),(\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2}),(\d{3})/);
                
                if (timeMatch) {
                    const startTime = parseInt(timeMatch[1]) * 3600 + parseInt(timeMatch[2]) * 60 + parseInt(timeMatch[3]) + parseInt(timeMatch[4]) / 1000;
                    const endTime = parseInt(timeMatch[5]) * 3600 + parseInt(timeMatch[6]) * 60 + parseInt(timeMatch[7]) + parseInt(timeMatch[8]) / 1000;
                    const text = lines.slice(2).join(' ');
                    
                    parsed.push({ start: startTime, end: endTime, text: text });
                }
            }
            
            return parsed;
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateTimeDisplay(currentTime) {
            const duration = wavesurfer.getDuration();
            timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;
        }

        function updateCurrentSubtitle(currentTime) {
            const index = subtitles.findIndex(s => currentTime >= s.start && currentTime <= s.end);
            
            if (index !== -1 && index !== currentIndex) {
                currentIndex = index;
                subtitleText.innerHTML = `<span class="current-subtitle">${subtitles[index].text}</span>`;
                
                document.querySelectorAll('.subtitle-item').forEach((el, i) => {
                    el.classList.toggle('active', i === index);
                });
            } else if (index === -1) {
                currentIndex = -1;
                subtitleText.textContent = '...';
            }
        }

        function renderSubtitleList() {
            subtitleList.innerHTML = subtitles.map((s, i) => `
                <div class="subtitle-item" data-index="${i}" onclick="seekTo(${s.start})">
                    <span class="subtitle-time">${formatTime(s.start)} - ${formatTime(s.end)}</span><br>
                    ${s.text.substring(0, 80)}${s.text.length > 80 ? '...' : ''}
                </div>
            `).join('');
        }

        function seekTo(time) {
            wavesurfer.seekTo(time / wavesurfer.getDuration());
            wavesurfer.play();
        }

        function copyAllSubtitles() {
            const text = subtitles.map(s => s.text).join('\n');
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.textContent = 'Copied!';
                setTimeout(() => copyBtn.textContent = 'Copy All', 2000);
            });
        }

        function resetPlayer() {
            if (wavesurfer) {
                wavesurfer.stop();
                wavesurfer.destroy();
                wavesurfer = null;
            }
            subtitles = [];
            currentIndex = -1;
            audioInput.value = '';
            srtInput.value = '';
            audioInfo.textContent = 'No file selected';
            srtInfo.textContent = 'No file selected';
            timeDisplay.textContent = '00:00 / 00:00';
            statusEl.textContent = 'Select audio and SRT files';
            statusEl.className = 'status';
            subtitleText.textContent = 'No subtitles loaded';
            subtitleList.innerHTML = '';
            playBtn.textContent = '▶ Play';
            localStorage.removeItem('lastAudioName');
            localStorage.removeItem('lastSRTName');
        }

        let customAudio;
        
        let customAudio, customSource;
        
        audioInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const url = URL.createObjectURL(file);
            
            // Initialize EQ context
            initEQ();
            
            // Create our custom audio element
            customAudio = new Audio(url);
            customAudio.crossOrigin = 'anonymous';
            
            // Connect EQ chain when audio plays
            const setupEQ = () => {
                if (!customSource) {
                    try {
                        customSource = eqContext.createMediaElementSource(customAudio);
                        customSource.connect(eqFilters[0]);
                        eqFilters[eqFilters.length-1].connect(eqContext.destination);
                        updateEQValues();
                        console.log('✓ EQ Active');
                    } catch(err) {
                        console.log('EQ:', err.message);
                    }
                }
            };
            
            customAudio.addEventListener('play', setupEQ, { once: true });
            
            // Load for waveform visualization
            if (!wavesurfer) initWaveform();
            wavesurfer.load(url);
            
            wavesurfer.on('ready', () => {
                // Replace with our audio element
                try {
                    wavesurfer.setMediaElement(customAudio);
                } catch(e) {
                    // Not supported, use default
                }
            });
            
            audioInfo.textContent = file.name;
            localStorage.setItem('lastAudioName', file.name);
            statusEl.textContent = 'Audio loaded';
            statusEl.className = 'status ready';
        });

        srtInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                subtitles = parseSRT(event.target.result);
                renderSubtitleList();
                subtitleText.textContent = 'SRT loaded - ' + subtitles.length + ' segments';
                srtInfo.textContent = file.name;
                localStorage.setItem('lastSRTName', file.name);
                statusEl.textContent = 'SRT loaded - ' + subtitles.length + ' segments';
                statusEl.className = 'status ready';
            };
            reader.readAsText(file);
        });

        playBtn.addEventListener('click', () => {
            if (!wavesurfer) return;
            wavesurfer.playPause();
        });

        stopBtn.addEventListener('click', () => {
            if (!wavesurfer) return;
            wavesurfer.stop();
            playBtn.textContent = '▶ Play';
            statusEl.textContent = 'Stopped';
        });

        resetBtn.addEventListener('click', resetPlayer);
        copyBtn.addEventListener('click', copyAllSubtitles);

        speedSelect.addEventListener('change', (e) => {
            if (!wavesurfer) return;
            wavesurfer.setPlaybackRate(parseFloat(e.target.value));
        });

        // Bind EQ slider events
        ['eq-60', 'eq-230', 'eq-910', 'eq-3600', 'eq-14000'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateEQValues);
        });
        
        document.getElementById('eq-enabled').addEventListener('change', updateEQValues);
    </script>
</body>
</html>
