<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>srtplayer</title>
    <script src="wavesurfer.min.js"></script>
    <style>
        @font-face {
            font-family: 'Geist Mono';
            src: url('./fonts/GeistMono.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Geist Mono', ui-monospace, 'Cascadia Code',
                'Source Code Pro', Menlo, Consolas, monospace;
            max-width: 640px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
            background: #fff;
            color: #000;
        }

        .dim { color: #999; }

        a { color: #000; text-decoration: underline; }
        a:hover { background: #000; color: #fff; text-decoration: none; }

        h1 { font-size: 1.25rem; font-weight: 400; margin-bottom: 0.25rem; }
        h2 {
            font-size: 1rem;
            font-weight: 400;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }
        .input-row label {
            white-space: nowrap;
            min-width: 7rem;
        }
        .input-row input[type="file"] {
            font-family: inherit;
            font-size: inherit;
            border: none;
            border-bottom: 1px solid #000;
            background: transparent;
            cursor: pointer;
            flex: 1;
            min-width: 0;
        }
        .input-row input[type="file"]::-webkit-file-upload-button {
            font-family: inherit;
            font-size: inherit;
        }
        .file-info {
            font-size: 0.85rem;
            min-width: 7rem;
            text-align: right;
        }

        #waveform {
            width: 100%;
            height: 64px;
            margin: 1rem 0 0.5rem;
            cursor: pointer;
        }

        .waveform-hover-time {
            position: absolute;
            bottom: calc(100% + 4px);
            transform: translateX(-50%);
            background: #000;
            color: #fff;
            padding: 2px 6px;
            font-size: 0.75rem;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 1000;
        }

        .waveform-wrap { position: relative; }

        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.25rem;
            flex-wrap: wrap;
        }

        .controls button {
            font-family: inherit;
            font-size: inherit;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            color: #000;
        }
        .controls button:hover { background: #000; color: #fff; }

        #play-btn { font-size: 1.2rem; padding: 0 0.25rem; }

        .speed-control { position: relative; }
        .speed-menu {
            position: absolute;
            bottom: 100%;
            left: 0;
            margin-bottom: 2px;
            background: #000;
            color: #fff;
            padding: 0.25rem 0;
            min-width: 4rem;
            z-index: 100;
        }
        .speed-menu button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.25rem 0.75rem;
            color: #fff;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .speed-menu button:hover { background: #333; }
        .speed-menu button.active { font-weight: 700; }

        hr { border: none; border-top: 1px solid #ccc; margin: 1rem 0; }

        #subtitle-text {
            font-size: 1.1rem;
            min-height: 2rem;
            margin-bottom: 0.5rem;
        }

        .subtitle-list {
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .subtitle-item {
            padding: 0.2rem 0;
            cursor: pointer;
        }
        .subtitle-item:hover { background: #eee; }
        .subtitle-item.active { font-weight: 700; }
        .subtitle-time { color: #999; font-size: 0.85rem; }

        #copy-btn {
            margin-top: 0.5rem;
            font-family: inherit;
            font-size: 0.85rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            padding: 0;
        }
        #copy-btn:hover { color: #000; }

        .clear-btn {
            font-family: inherit;
            font-size: 0.85rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            padding: 0;
        }
        .clear-btn:hover { color: #000; }

        footer { margin-top: 2rem; }

        @media (max-width: 480px) {
            body { padding: 1rem; }
            .input-row { flex-wrap: wrap; }
            .input-row label { min-width: 100%; }
            .file-info { min-width: 100%; text-align: left; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>srtplayer</h1>
        <p class="dim">// audio player with synced subtitles</p>

        <h2>[input]</h2>
        <div class="input-row">
            <label>audio →</label>
            <input type="file" id="audio-input" accept="audio/*,.m4a,.mp3,.wav,.flac,.ogg,.webm">
            <span class="dim file-info" id="audio-info">none</span>
            <button class="clear-btn" id="clear-audio" style="display:none;">[×]</button>
        </div>
        <div class="input-row">
            <label>srt →</label>
            <input type="file" id="srt-input" accept=".srt">
            <span class="dim file-info" id="srt-info">none</span>
            <button class="clear-btn" id="clear-srt" style="display:none;">[×]</button>
        </div>

        <h2>[player]</h2>
        <div class="waveform-wrap">
            <div id="waveform"></div>
            <div class="waveform-hover-time" id="waveform-hover-time" aria-hidden="true"></div>
        </div>
        <div class="controls">
            <button id="play-btn" aria-label="Play">▶</button>
            <button id="stop-btn">stop</button>
            <button id="reset-btn">reset</button>
            <div class="speed-control">
                <button id="speed-btn" aria-haspopup="menu" aria-expanded="false">1x</button>
                <div class="speed-menu" id="speed-menu" role="menu" style="display: none;">
                    <button role="menuitemradio" data-rate="0.5">0.5x</button>
                    <button role="menuitemradio" data-rate="0.75">0.75x</button>
                    <button role="menuitemradio" data-rate="1" class="active">1x</button>
                    <button role="menuitemradio" data-rate="1.25">1.25x</button>
                    <button role="menuitemradio" data-rate="1.5">1.5x</button>
                    <button role="menuitemradio" data-rate="2">2x</button>
                </div>
            </div>
            <span class="dim" id="time-display">00:00 / 00:00</span>
        </div>
        <p class="dim" id="status">select files to begin</p>

        <h2>[subtitles]</h2>
        <div id="subtitle-text" class="dim">—</div>
        <hr>
        <div class="subtitle-list" id="subtitle-list"></div>
        <button id="copy-btn">copy all</button>

        <footer>
            <p class="dim">→ <a href="https://github.com/arthiccc/srtplayer" target="_blank" rel="noopener">github.com/arthiccc/srtplayer</a></p>
        </footer>
    </main>

    <script>
        'use strict';

        var MAX_SRT_BLOCKS = 10000;
        var MAX_SUBTITLE_DISPLAY_LENGTH = 80;
        var COPY_RESET_DELAY_MS = 2000;
        var SRT_TIME_RE = /(\d{2}):(\d{2}):(\d{2}),(\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2}),(\d{3})/;

        var wavesurfer;
        var state = { subtitles: [], currentIndex: -1 };

        function assert(condition, msg) {
            if (!condition) {
                console.error('Assertion failed: ' + msg);
                return false;
            }
            return true;
        }

        function guardWaveSurfer() {
            if (!wavesurfer) {
                console.error('No wavesurfer instance');
                return false;
            }
            return true;
        }

        function initDOM() {
            return {
                audioInput: document.getElementById('audio-input'),
                srtInput: document.getElementById('srt-input'),
                playBtn: document.getElementById('play-btn'),
                stopBtn: document.getElementById('stop-btn'),
                resetBtn: document.getElementById('reset-btn'),
                copyBtn: document.getElementById('copy-btn'),
                clearAudio: document.getElementById('clear-audio'),
                clearSRT: document.getElementById('clear-srt'),
                speedBtn: document.getElementById('speed-btn'),
                speedMenu: document.getElementById('speed-menu'),
                timeDisplay: document.getElementById('time-display'),
                statusEl: document.getElementById('status'),
                subtitleText: document.getElementById('subtitle-text'),
                subtitleList: document.getElementById('subtitle-list'),
                audioInfo: document.getElementById('audio-info'),
                srtInfo: document.getElementById('srt-info'),
                waveformHoverTime: document.getElementById('waveform-hover-time'),
            };
        }

        var dom = initDOM();

        function setStatus(text, cls) {
            dom.statusEl.textContent = text;
            dom.statusEl.className = cls ? 'dim ' + cls : 'dim';
        }

        function setPlayButtonState(playing) {
            dom.playBtn.textContent = playing ? '\u275A\u275A' : '\u25B6';
            dom.playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
        }

        function formatTime(seconds) {
            if (!assert(typeof seconds === 'number' && !isNaN(seconds), 'formatTime: invalid number')) {
                return '00:00:00';
            }
            if (!assert(seconds >= 0, 'formatTime: negative value')) {
                return '00:00:00';
            }
            var h = Math.floor(seconds / 3600);
            var m = Math.floor((seconds % 3600) / 60);
            var s = Math.floor(seconds % 60);
            return h.toString().padStart(2, '0') + ':' +
                   m.toString().padStart(2, '0') + ':' +
                   s.toString().padStart(2, '0');
        }

        function parseSRTTimestamp(match) {
            var start = parseInt(match[1]) * 3600 +
                        parseInt(match[2]) * 60 +
                        parseInt(match[3]) +
                        parseInt(match[4]) / 1000;
            var end = parseInt(match[5]) * 3600 +
                      parseInt(match[6]) * 60 +
                      parseInt(match[7]) +
                      parseInt(match[8]) / 1000;
            return { start: start, end: end };
        }

        function parseSRT(srtText) {
            if (!assert(typeof srtText === 'string', 'parseSRT: expected string')) {
                return [];
            }
            if (!assert(srtText.trim().length > 0, 'parseSRT: empty input')) {
                return [];
            }

            var blocks = srtText.trim().split(/\n\n+/);
            var parsed = [];

            for (var i = 0; i < blocks.length && i < MAX_SRT_BLOCKS; i++) {
                var lines = blocks[i].split('\n');
                if (lines.length < 3) { continue; }

                var timeMatch = lines[1].match(SRT_TIME_RE);
                if (!timeMatch) { continue; }

                try {
                    var ts = parseSRTTimestamp(timeMatch);
                    var text = lines.slice(2).join(' ');
                    parsed.push({ start: ts.start, end: ts.end, text: text });
                } catch (e) {
                    console.error('parseSRT: failed to parse block ' + i, e);
                }
            }

            if (blocks.length > MAX_SRT_BLOCKS) {
                console.error('parseSRT: exceeded MAX_SRT_BLOCKS (' + MAX_SRT_BLOCKS + ')');
            }

            return parsed;
        }

        function initWaveform() {
            wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#ccc',
                progressColor: '#000',
                cursorColor: '#000',
                barWidth: 1,
                barGap: 2,
                barRadius: 0,
                height: 64,
                normalize: true,
            });

            wavesurfer.on('play', function () {
                setPlayButtonState(true);
                setStatus('playing', 'playing');
            });

            wavesurfer.on('pause', function () {
                setPlayButtonState(false);
                setStatus('paused', '');
            });

            wavesurfer.on('timeupdate', function (currentTime) {
                updateTimeDisplay(currentTime);
                updateCurrentSubtitle(currentTime);
            });

            wavesurfer.on('finish', function () {
                setPlayButtonState(false);
                setStatus('finished', 'dim');
            });
        }

        function updateTimeDisplay(currentTime) {
            if (!guardWaveSurfer()) { return; }
            var duration = wavesurfer.getDuration();
            dom.timeDisplay.textContent = formatTime(currentTime) + ' / ' + formatTime(duration);
        }

        function updateCurrentSubtitle(currentTime) {
            if (!assert(Array.isArray(state.subtitles), 'updateCurrentSubtitle: not array')) {
                return;
            }

            var foundIndex = -1;
            for (var i = 0; i < state.subtitles.length && i < MAX_SRT_BLOCKS; i++) {
                if (currentTime >= state.subtitles[i].start && currentTime <= state.subtitles[i].end) {
                    foundIndex = i;
                    break;
                }
            }

            if (foundIndex !== -1 && foundIndex !== state.currentIndex) {
                state.currentIndex = foundIndex;
                var safeText = state.subtitles[foundIndex].text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                dom.subtitleText.innerHTML = safeText;

                var items = document.querySelectorAll('.subtitle-item');
                for (var j = 0; j < items.length && j < MAX_SRT_BLOCKS; j++) {
                    items[j].classList.toggle('active', j === foundIndex);
                }
            } else if (foundIndex === -1) {
                state.currentIndex = -1;
                dom.subtitleText.textContent = '\u2014';
            }
        }

        function renderSubtitleList() {
            if (!assert(Array.isArray(state.subtitles), 'renderSubtitleList: not array')) {
                return;
            }

            var count = Math.min(state.subtitles.length, MAX_SRT_BLOCKS);
            var html = '';
            for (var i = 0; i < count; i++) {
                var s = state.subtitles[i];
                var truncated = s.text.length > MAX_SUBTITLE_DISPLAY_LENGTH
                    ? s.text.substring(0, MAX_SUBTITLE_DISPLAY_LENGTH) + '...'
                    : s.text;
                html += '<div class="subtitle-item" data-index="' + i + '">' +
                    '<span class="subtitle-time">' + formatTime(s.start) + ' - ' + formatTime(s.end) + '</span> ' +
                    truncated +
                    '</div>';
            }
            dom.subtitleList.innerHTML = html;

            var items = dom.subtitleList.querySelectorAll('.subtitle-item');
            for (var j = 0; j < items.length; j++) {
                items[j].addEventListener('click', createSeekHandler(state.subtitles[j].start));
            }
        }

        function createSeekHandler(time) {
            return function () {
                seekTo(time);
            };
        }

        function seekTo(time) {
            if (!guardWaveSurfer()) { return; }
            if (!assert(typeof time === 'number' && !isNaN(time), 'seekTo: invalid time')) { return; }
            if (!assert(time >= 0, 'seekTo: negative time')) { return; }

            var duration = wavesurfer.getDuration();
            if (!assert(duration > 0, 'seekTo: zero duration')) { return; }

            wavesurfer.seekTo(time / duration);
            wavesurfer.play();
        }

        function copyAllSubtitles() {
            if (!assert(state.subtitles.length > 0, 'copyAllSubtitles: no subtitles')) { return; }

            var text = state.subtitles.map(function (s) { return s.text; }).join('\n');
            try {
                navigator.clipboard.writeText(text).then(function () {
                    dom.copyBtn.textContent = 'copied!';
                    setTimeout(function () { dom.copyBtn.textContent = 'copy all'; }, COPY_RESET_DELAY_MS);
                });
            } catch (e) {
                console.error('copyAllSubtitles: clipboard write failed', e);
            }
        }

        function resetPlayer() {
            if (wavesurfer) {
                wavesurfer.stop();
                wavesurfer.destroy();
                wavesurfer = null;
            }
            state.subtitles = [];
            state.currentIndex = -1;
            dom.audioInput.value = '';
            dom.srtInput.value = '';
            dom.audioInfo.textContent = 'none';
            dom.srtInfo.textContent = 'none';
            dom.clearAudio.style.display = 'none';
            dom.clearSRT.style.display = 'none';
            dom.timeDisplay.textContent = '00:00 / 00:00';
            setStatus('select files to begin', 'dim');
            dom.subtitleText.textContent = '\u2014';
            dom.subtitleList.innerHTML = '';
            setPlayButtonState(false);
        }

        function clearAudioInput() {
            dom.audioInput.value = '';
            dom.audioInfo.textContent = 'none';
            dom.clearAudio.style.display = 'none';
        }

        function clearSRTInput() {
            dom.srtInput.value = '';
            dom.srtInfo.textContent = 'none';
            dom.clearSRT.style.display = 'none';
        }

        function handleAudioChange(e) {
            var file = e.target.files[0];
            if (!assert(file, 'handleAudioChange: no file selected')) { return; }

            if (!wavesurfer) { initWaveform(); }

            var url = URL.createObjectURL(file);
            wavesurfer.load(url);

            dom.audioInfo.textContent = file.name;
            dom.clearAudio.style.display = '';
            setStatus('loaded', 'dim');
        }

        function handleSRTChange(e) {
            var file = e.target.files[0];
            if (!assert(file, 'handleSRTChange: no file selected')) { return; }

            var reader = new FileReader();
            reader.onload = function (event) {
                try {
                    state.subtitles = parseSRT(event.target.result);
                    renderSubtitleList();
                    var count = state.subtitles.length;
                    dom.subtitleText.textContent = count + ' segments loaded';
                    dom.srtInfo.textContent = file.name;
                    dom.clearSRT.style.display = '';
                    setStatus(count + ' segments', 'dim');
                } catch (err) {
                    console.error('handleSRTChange: parse failed', err);
                    setStatus('parse error', '');
                }
            };
            reader.readAsText(file);
        }

        function handlePlay() {
            if (!guardWaveSurfer()) { return; }
            wavesurfer.playPause();
        }

        function handleStop() {
            if (!guardWaveSurfer()) { return; }
            wavesurfer.stop();
            setPlayButtonState(false);
            setStatus('stopped', 'dim');
        }

        function handleSpeedChange(rate) {
            if (!guardWaveSurfer()) { return; }
            wavesurfer.setPlaybackRate(rate);
            dom.speedBtn.textContent = rate === 1 ? '1x' : rate + 'x';
            var options = dom.speedMenu.querySelectorAll('button');
            for (var i = 0; i < options.length; i++) {
                var isActive = parseFloat(options[i].getAttribute('data-rate')) === rate;
                options[i].classList.toggle('active', isActive);
                options[i].setAttribute('aria-checked', isActive ? 'true' : 'false');
            }
        }

        function toggleSpeedMenu(show) {
            var isOpen = show !== undefined ? show : dom.speedMenu.style.display === 'none';
            dom.speedMenu.style.display = isOpen ? 'block' : 'none';
            dom.speedBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            if (isOpen) {
                var active = dom.speedMenu.querySelector('.active') || dom.speedMenu.querySelector('button');
                if (active) { active.focus(); }
            }
        }

        function setupWaveformHover() {
            var waveformEl = document.getElementById('waveform');
            var hoverEl = dom.waveformHoverTime;

            waveformEl.addEventListener('pointermove', function (e) {
                if (!guardWaveSurfer()) { return; }
                var rect = waveformEl.getBoundingClientRect();
                if (!rect.width) { return; }
                var percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                var duration = wavesurfer.getDuration();
                if (!duration) { return; }
                hoverEl.textContent = formatTime(percent * duration);
                hoverEl.style.left = (percent * 100) + '%';
                hoverEl.style.opacity = '1';
            });

            waveformEl.addEventListener('pointerleave', function () {
                hoverEl.style.opacity = '0';
            });
        }

        function init() {
            dom.audioInput.addEventListener('change', handleAudioChange);
            dom.srtInput.addEventListener('change', handleSRTChange);
            dom.playBtn.addEventListener('click', handlePlay);
            dom.stopBtn.addEventListener('click', handleStop);
            dom.resetBtn.addEventListener('click', resetPlayer);
            dom.copyBtn.addEventListener('click', copyAllSubtitles);
            dom.clearAudio.addEventListener('click', clearAudioInput);
            dom.clearSRT.addEventListener('click', clearSRTInput);

            dom.speedBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                toggleSpeedMenu();
            });

            dom.speedMenu.addEventListener('click', function (e) {
                e.stopPropagation();
                var option = e.target.closest('button[data-rate]');
                if (option) {
                    handleSpeedChange(parseFloat(option.getAttribute('data-rate')));
                    toggleSpeedMenu(false);
                    dom.speedBtn.focus();
                }
            });

            document.addEventListener('click', function () {
                toggleSpeedMenu(false);
            });

            setupWaveformHover();
        }

        init();
    </script>
</body>
</html>
